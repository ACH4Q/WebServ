<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>500 Internal Server Error</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #111827;
      color: #e5e7eb;
      font-family: Arial, sans-serif;
    }
    main {
      text-align: center;
      padding: 2rem;
      border: 1px solid #374151;
      border-radius: 12px;
      background: #0f172a;
      max-width: 560px;
    }
    h1 { font-size: 2.6rem; margin: 0 0 .5rem; color: #f87171; }
    p { margin: .5rem 0; color: #d1d5db; }
    a { color: #93c5fd; }
  </style>
</head>
<body>
  <main>
    <h1>500</h1>
    <p>Internal Server Error.</p>
    <p>Something went wrong while processing your request.</p>
    <p><a href="/">Try again from home</a></p>
  </main>
</body>
</html>
