<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 Not Found</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f172a;
      color: #e2e8f0;
      font-family: Arial, sans-serif;
    }
    main {
      text-align: center;
      padding: 2rem;
      border: 1px solid #334155;
      border-radius: 12px;
      background: #111827;
      max-width: 560px;
    }
    h1 { font-size: 3rem; margin: 0 0 .5rem; color: #60a5fa; }
    p { margin: .5rem 0; color: #cbd5e1; }
    a { color: #93c5fd; }
  </style>
</head>
<body>
  <main>
    <h1>404</h1>
    <p>Page not found.</p>
    <p>The resource you requested does not exist on this server.</p>
    <p><a href="/">Back to home</a></p>
  </main>
</body>
</html>
