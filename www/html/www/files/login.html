<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registration - WebServ Test</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --border: #374151;
      --input-bg: #1f2937;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: var(--text);
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 8px;
    }

    p {
      color: var(--muted);
      margin-bottom: 20px;
      line-height: 1.4;
    }

    form {
      display: grid;
      gap: 14px;
    }

    label {
      font-size: 0.92rem;
      margin-bottom: 6px;
      display: inline-block;
    }

    input,
    select,
    textarea {
      width: 100%;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .hint {
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 4px;
    }

    .checkbox {
      display: flex;
      align-items: start;
      gap: 10px;
      margin-top: 2px;
    }

    .checkbox input {
      width: auto;
      margin-top: 3px;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.96rem;
      font-weight: 600;
      background: var(--accent);
      color: white;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }

    button:hover {
      background: var(--accent-hover);
    }

    .warn {
      color: var(--danger);
      font-size: 0.85rem;
    }

    @media (max-width: 540px) {
      .row {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Register Account</h1>
    <p>
      This form is made for testing <strong>POST</strong> requests on your WebServ.
      Update the <code>action</code> URL if needed.
    </p>

    <form action="/register" method="POST" enctype="application/x-www-form-urlencoded">
      <div class="row">
        <div>
          <label for="first_name">First Name</label>
          <input id="first_name" name="first_name" type="text" placeholder="Soufiane" required />
        </div>
        <div>
          <label for="last_name">Last Name</label>
          <input id="last_name" name="last_name" type="text" placeholder="Achaq" required />
        </div>
      </div>

      <div>
        <label for="username">Username</label>
        <input id="username" name="username" type="text" placeholder="souel_bo" required minlength="3" maxlength="30" />
      </div>

      <div>
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required />
      </div>

      <div class="row">
        <div>
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required minlength="6" />
        </div>
        <div>
          <label for="confirm_password">Confirm Password</label>
          <input id="confirm_password" name="confirm_password" type="password" required minlength="6" />
        </div>
      </div>

      <div>
        <label for="country">Country</label>
        <select id="country" name="country" required>
          <option value="">Select a country</option>
          <option value="MA">Morocco</option>
          <option value="FR">France</option>
          <option value="ES">Spain</option>
          <option value="US">United States</option>
          <option value="OTHER">Other</option>
        </select>
      </div>

      <div>
        <label for="bio">Short Bio</label>
        <textarea id="bio" name="bio" rows="4" placeholder="Tell us something about you..."></textarea>
        <div class="hint">Optional field to test larger body payloads.</div>
      </div>

      <div class="checkbox">
        <input id="terms" name="terms" type="checkbox" value="accepted" required />
        <label for="terms">I accept the terms and conditions</label>
      </div>

      <button type="submit">Create Account (POST)</button>
      <div class="warn">Note: This page does not validate password match in JavaScript; it posts directly for backend testing.</div>
    </form>
  </main>
</body>
</html>
