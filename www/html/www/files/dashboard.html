<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebServ | Control Panel</title>
    <style>
        :root {
            --bg: #1e1e2e;
            --surface: #313244;
            --text: #cdd6f4;
            --primary: #89b4fa;
            --danger: #f38ba8;
            --success: #a6e3a1;
            --warning: #f9e2af;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
        }
        .container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
        }
        .card {
            background: var(--surface);
            padding: 25px;
            border-radius: 12px;
            flex: 1;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }
        h2 { margin-top: 0; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        input[type="file"], input[type="text"] {
            width: 90%;
            padding: 10px;
            margin: 15px 0;
            background: var(--bg);
            border: 1px solid #585b70;
            color: var(--text);
            border-radius: 6px;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
        }
        .btn-post { background-color: var(--primary); color: #11111b; }
        .btn-post:hover { background-color: #74c7ec; }
        
        .btn-delete { background-color: var(--danger); color: #11111b; }
        .btn-delete:hover { background-color: #eba0ac; }

        .btn-cgi-get { background-color: var(--success); color: #11111b; margin-bottom: 10px; }
        .btn-cgi-get:hover { background-color: #8bd5ca; }

        .btn-cgi-post { background-color: var(--warning); color: #11111b; }
        .btn-cgi-post:hover { background-color: #f2cdcd; }
        
        #console {
            margin-top: 10px;
            width: 100%;
            max-width: 800px;
            background: #11111b;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            min-height: 100px;
        }
        
        #cgiOutput {
            margin-top: 20px;
            width: 100%;
            background: #11111b;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            min-height: 100px;
            box-sizing: border-box;
            border: 1px solid #585b70;
            overflow-x: auto;
        }

        .log-success { color: var(--success); }
        .log-error { color: var(--danger); }
    </style>
</head>
<body>

    <h1>🚀 WebServ Dashboard</h1>

    <div class="container">
        <div class="card">
            <h2>Upload File (POST)</h2>
            <form id="uploadForm">
                <label>Select any file to stream to the server:</label>
                <input type="file" id="fileInput" required>
                <button type="submit" class="btn-post">Upload File</button>
            </form>
        </div>

        <div class="card">
            <h2>Remove File (DELETE)</h2>
            <label>Type the exact filename to delete:</label>
            <input type="text" id="deleteInput" placeholder="e.g., video.mp4" required>
            <button id="deleteBtn" class="btn-delete">Delete File</button>
        </div>
    </div>

    <div class="container">
        <div class="card" style="width: 100%;">
            <h2>👨‍🍳 CGI Chef Testing Zone</h2>
            <label>Send a message to the Python CGI Script:</label>
            <input type="text" id="cgiInput" placeholder="Enter a secret message to send to Python...">
            
            <div style="display: flex; gap: 15px; margin-top: 10px;">
                <button onclick="runCgi('GET')" class="btn-cgi-get">Test GET Request (Query String)</button>
                <button onclick="runCgi('POST')" class="btn-cgi-post">Test POST Request (Stdin)</button>
            </div>

            <div id="cgiOutput">
                <span style="color: #6c7086;"><em>CGI HTML Output will render here...</em></span>
            </div>
        </div>
    </div>

    <div id="console">
        <span style="color: #6c7086;">Server logs will appear here...</span><br>
    </div>

    <script>
        const terminal = document.getElementById('console');

        function log(message, type) {
            const span = document.createElement('span');
            span.className = type === 'success' ? 'log-success' : 'log-error';
            span.innerText = `> ${message}\n`;
            terminal.appendChild(span);
        }

        // --- HANDLE POST (UPLOAD) ---
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault(); 
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];

            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/uploads', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok || response.status === 201) {
                    log(`[201 Created] Successfully uploaded: ${file.name}`, 'success');
                } else {
                    log(`[${response.status}] Upload failed: Server rejected the file.`, 'error');
                }
            } catch (err) {
                log(`[Error] Could not connect to server.`, 'error');
            }
        });

        // --- HANDLE DELETE ---
        document.getElementById('deleteBtn').addEventListener('click', async () => {
            const filename = document.getElementById('deleteInput').value.trim();
            if (!filename) {
                log(`[Warning] Please enter a filename.`, 'error');
                return;
            }

            try {
                const response = await fetch(`/uploads/${filename}`, {
                    method: 'DELETE'
                });

                if (response.ok || response.status === 204) {
                    log(`[204 No Content] Successfully deleted: ${filename}`, 'success');
                } else if (response.status === 404) {
                    log(`[404 Not Found] File '${filename}' does not exist on server.`, 'error');
                } else if (response.status === 403) {
                    log(`[403 Forbidden] You do not have permission to delete this.`, 'error');
                } else {
                    log(`[${response.status}] Failed to delete file.`, 'error');
                }
            } catch (err) {
                log(`[Error] Could not connect to server.`, 'error');
            }
        });

        // --- NEW: HANDLE CGI EXECUTION ---
        async function runCgi(method) {
            const outputBox = document.getElementById('cgiOutput');
            const inputValue = document.getElementById('cgiInput').value || "No message provided";
            
            outputBox.innerHTML = "<span style='color: var(--primary);'><em>Cooking... Please wait...</em></span>";

            // IMPORTANT: Change this URL if your test.py is located somewhere else!
            // In your runCgi() function in dashboard.html:
            let url = '/cgi-bin/test.py';
            let fetchOptions = { method: method };

            if (method === 'GET') {
                url += '?message=' + encodeURIComponent(inputValue);
            } 
            else if (method === 'POST') {
                fetchOptions.headers = { 'Content-Type': 'application/x-www-form-urlencoded' };
                fetchOptions.body = 'message=' + encodeURIComponent(inputValue);
            }

            try {
                const response = await fetch(url, fetchOptions);
                const htmlText = await response.text();
                
                if (response.ok) {
                    outputBox.innerHTML = htmlText;
                    log(`[200 OK] CGI ${method} execution successful.`, 'success');
                } else {
                    outputBox.innerHTML = `<span style="color: var(--danger);">Server returned Error ${response.status}</span>`;
                    log(`[${response.status}] CGI Script crashed or failed.`, 'error');
                }
            } 
            catch (error) {
                outputBox.innerHTML = `<span style="color: var(--danger);">Network Error: ${error}</span>`;
                log(`[Error] CGI connection failed.`, 'error');
            }
        }
    </script>

</body>
</html>
